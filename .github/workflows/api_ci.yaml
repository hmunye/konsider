name: API CI

on:
  push:
    paths:
      - "prototype_v3/api/**"
  pull_request:
    paths:
      - "prototype_v3/api/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        working-directory: prototype_v3/api
        run: cargo test --all-features

  fmt:
    name: Formating
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Enforce Formatting
        working-directory: prototype_v3/api
        run: cargo fmt --all -- --check

  clippy:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Lint Code
        working-directory: prototype_v3/api
        run: cargo clippy -- -D warnings
